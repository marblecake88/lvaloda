services:
  backend:
    build: ./backend
    container_name: lvaloda-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/lvaloda.db
    volumes:
      - lvaloda_data:/app/data

  frontend:
    build: ./frontend
    container_name: lvaloda-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8010:80"

volumes:
  lvaloda_data:
